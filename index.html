<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

<img src="alci.png  " class="logo izquierda">
<img src="alci.png" class="logo derecha">


<div class="container">
    <h1>Simulador de Crédito</h1>

    <h2>Datos del Cliente</h2>

    <label>Ingresos:</label>
    <input type="number" id="txtIngresos" placeholder="Ej: 1000">

    <label>Arriendo:</label>
    <input type="number" id="txtArriendo" placeholder="Ej: 200">

    <label>Alimentación:</label>
    <input type="number" id="txtAlimentacion" placeholder="Ej: 150">

    <label>Varios:</label>
    <input type="number" id="txtVarios" placeholder="Ej: 100">

    <p>Total de gastos: $ <span id="spnTotalGastos">0</span></p>

    <div class="resultado">
        <p>Disponible: $ <span id="spnDisponible">0</span></p>
        <p>Capacidad de Pago: $ <span id="spnCapacidadPago">0</span></p>
    </div>

    <h2>Datos del Crédito</h2>

    <label>Monto:</label>
    <input type="number" id="txtMonto" placeholder="Ej: 5000">

    <label>Plazo (años):</label>
    <input type="number" id="txtPlazo" placeholder="Ej: 2">

    <label>Tasa de Interés (%):</label>
    <input type="number" id="txtTasaInteres" placeholder="Ej: 10">

    <div class="resultado">
        <p>Interés a pagar: $ <span id="spnInteresPagar">0</span></p>
        <p>Total préstamo: $ <span id="spnTotalPrestamo">0</span></p>
        <p>Cuota mensual: $ <span id="spnCuotaMensual">0</span></p>
    </div>

    <p>Estado del crédito: <span id="spnEstadoCredito">-</span></p>

    <div class="buttons">
        <button onclick="calcular()">Calcular Crédito</button>
        <button onclick="limpiar()">Reiniciar</button>
    </div>
</div>

<script src="funciones.js"></script>

</body>
</html>
